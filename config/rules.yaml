schema_version: "1.0"
config_version: "mvp-v1"

defaults:
  min_prev_net_revenue: 3000
  volume_threshold: 5

rules:
  - id: A1
    metric_id: net_revenue
    severity: WARN
    condition: delta_pct_lte
    threshold: -0.15
    requires_min_prev_net_revenue: true
  - id: A2
    metric_id: net_revenue
    severity: INFO
    condition: delta_pct_gte
    threshold: 0.25
    requires_min_prev_net_revenue: true
  - id: B1
    metric_id: cac_paid
    severity: WARN
    condition: delta_pct_gte
    threshold: 0.20
    requires_min_prev_net_revenue: true
    requires_prev_new_clients_paid_gte: 1
  - id: C1
    metric_id: paid_lead_to_client
    severity: WARN
    condition: delta_pct_lte
    threshold: -0.15
    requires_prev_leads_paid_gte: 5
  - id: D1
    metric_id: show_rate
    severity: WARN
    condition: delta_pct_lte
    threshold: -0.10
    requires_prev_bookings_total_gte: 5
  - id: E1
    metric_id: cancel_rate
    severity: WARN
    condition: delta_pct_gte
    threshold: 0.15
    requires_prev_bookings_total_gte: 5
  - id: F1
    metric_id: bookings_total
    severity: WARN
    condition: hybrid_delta_pct_lte
    threshold_pct: -0.20
    threshold_abs: -3
    volume_metric: bookings_total
  - id: G1
    metric_id: new_clients_total
    severity: WARN
    condition: hybrid_delta_pct_lte
    threshold_pct: -0.20
    threshold_abs: -3
    volume_metric: new_clients_total
  - id: H1
    metric_id: gross_margin
    severity: WARN
    condition: absolute_lt
    threshold: 0.50
    requires_current_net_revenue_gt: 0
  - id: H2
    metric_id: marketing_pct_revenue
    severity: WARN
    condition: absolute_gt
    threshold: 0.40
    requires_current_net_revenue_gt: 0
  - id: H3
    metric_id: contribution_after_marketing
    severity: WARN
    condition: delta_pct_lte
    threshold: -0.25
    requires_min_prev_net_revenue: true
    requires_current_net_revenue_gt: 0
