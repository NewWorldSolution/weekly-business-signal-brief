schema_version: "1.0"
config_version: "mvp-v1"

defaults:
  min_prev_net_revenue: 3000
  volume_threshold: 5

history:
  n_weeks: 4                  # default lookback window for trend queries
  min_consecutive: 2          # minimum consecutive weeks to classify rising or falling
  stable_band_pct: 0.02       # week-over-week change within ±2% is considered stable
  stable_min_weeks: 3         # minimum weeks of stability to assign the stable label

eval:
  grounding_tolerance_abs: 0.01
  grounding_tolerance_rel: 0.01
  grounding_pct_normalization: true

rules:
  - id: A1
    label: Revenue Decline
    category: revenue
    priority: 10
    metric_id: net_revenue
    severity: WARN
    condition: delta_pct_lte
    threshold: -0.15
    requires_min_prev_net_revenue: true
  - id: A2
    label: Revenue Surge
    category: revenue
    priority: 2
    metric_id: net_revenue
    severity: INFO
    condition: delta_pct_gte
    threshold: 0.25
    requires_min_prev_net_revenue: true
  - id: B1
    label: Customer Acquisition Cost Rising
    category: acquisition
    priority: 8
    metric_id: cac_paid
    severity: WARN
    condition: delta_pct_gte
    threshold: 0.20
    requires_min_prev_net_revenue: true
    requires_prev_new_clients_paid_gte: 1
  - id: C1
    label: Paid Lead Conversion Falling
    category: acquisition
    priority: 6
    metric_id: paid_lead_to_client
    severity: WARN
    condition: delta_pct_lte
    threshold: -0.15
    requires_prev_leads_paid_gte: 5
  - id: D1
    label: Show Rate Declining
    category: operations
    priority: 6
    metric_id: show_rate
    severity: WARN
    condition: delta_pct_lte
    threshold: -0.10
    requires_prev_bookings_total_gte: 5
  - id: E1
    label: Cancellation Rate Rising
    category: operations
    priority: 6
    metric_id: cancel_rate
    severity: WARN
    condition: delta_pct_gte
    threshold: 0.15
    requires_prev_bookings_total_gte: 5
  - id: F1
    label: Bookings Volume Falling
    category: operations
    priority: 8
    metric_id: bookings_total
    severity: WARN
    condition: hybrid_delta_pct_lte
    threshold_pct: -0.20
    threshold_abs: -3
    volume_metric: bookings_total
  - id: G1
    label: New Client Acquisition Falling
    category: acquisition
    priority: 8
    metric_id: new_clients_total
    severity: WARN
    condition: hybrid_delta_pct_lte
    threshold_pct: -0.20
    threshold_abs: -3
    volume_metric: new_clients_total
  - id: H1
    label: Gross Margin Below Threshold
    category: financial_health
    priority: 10
    metric_id: gross_margin
    severity: WARN
    condition: absolute_lt
    threshold: 0.50
    requires_current_net_revenue_gt: 0
  - id: H2
    label: Marketing Spend Overweight
    category: financial_health
    priority: 8
    metric_id: marketing_pct_revenue
    severity: WARN
    condition: absolute_gt
    threshold: 0.40
    requires_current_net_revenue_gt: 0
  - id: H3
    label: Contribution Margin Declining
    category: financial_health
    priority: 10
    metric_id: contribution_after_marketing
    severity: WARN
    condition: delta_pct_lte
    threshold: -0.25
    requires_min_prev_net_revenue: true
    requires_current_net_revenue_gt: 0
