name: Claude Code

on:
  workflow_dispatch:
  pull_request:
  issue_comment:
    types: [created]
  issues:

permissions:
  contents: write
  pull-requests: write
  issues: write
  checks: write

jobs:
  claude:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Claude Code
        uses: anthropics/claude-code-action@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}