name: Codex Review

# Fires ONLY when a PR comment contains "@codex review".
# Does not run automatically on PR open, push, or any other event.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  codex-review:
    if: |
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@codex review')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@codex review'))

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Codex Review and post comment
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          pip install --quiet openai

          PR="${ISSUE_NUMBER:-$PR_NUMBER}"

          python3 - <<'PYEOF'
          import os, subprocess
          from openai import OpenAI

          pr = os.environ["PR"]
          repo = os.environ["GH_REPO"]

          diff = subprocess.check_output(
              ["gh", "pr", "diff", pr, "--repo", repo],
              text=True,
          )

          client = OpenAI(api_key=os.environ["OPENAI_API_KEY"])
          response = client.chat.completions.create(
              model="gpt-4o",
              messages=[
                  {
                      "role": "system",
                      "content": (
                          "You are a senior code reviewer for a Python analytics project. "
                          "Review the git diff for: correctness, logic errors, test coverage "
                          "for new behaviour, adherence to project conventions (deterministic "
                          "pipeline, config-driven rules, no hardcoded thresholds), and ruff "
                          "lint compliance. Be concise and actionable."
                      ),
                  },
                  {"role": "user", "content": f"Please review this diff:\n\n{diff}"},
              ],
          )
          review = response.choices[0].message.content

          body = f"**Codex Review**\n\n{review}"
          subprocess.run(
              ["gh", "pr", "comment", pr, "--repo", repo, "--body", body],
              check=True,
          )
          PYEOF
