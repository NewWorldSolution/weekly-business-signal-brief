services:
  wbsb:
    build: .
    cap_drop:
      - ALL
    env_file:
      - path: .env          # developer local — never committed
        required: false     # valid in clean checkout; secrets injected by orchestrator
    volumes:
      - ./runs:/app/runs
      - ./data:/app/data
      - ./feedback:/app/feedback
    command: wbsb run -i /app/data/incoming/latest.csv --llm-mode full --deliver
